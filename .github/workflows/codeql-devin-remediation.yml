# CodeQL + Devin Auto-Remediation GitHub Action (Batch Mode)
#
# ┌──────────────────────────────────────────────────────────────────┐
# │  SETUP: Copy this file into .github/workflows/ in your repo.    │
# │                                                                  │
# │  Required repo secrets:                                          │
# │    DEVIN_API_KEY         — Devin service-user token (cog_…)      │
# │    DEVIN_ORG_ID          — Your Devin organization ID            │
# │    DEVIN_PLAYBOOK_ID     — Parent playbook ID (batch orchestr.)  │
# │    DEVIN_CHILD_PLAYBOOK_ID — Child playbook ID (per-file fix)    │
# │                                                                  │
# │  Optional repo secrets:                                          │
# │    DEVIN_USER_ID  — Create sessions as this user so they appear  │
# │                     in the Devin web app (requires the service   │
# │                     user to have ImpersonateOrgSessions perm)    │
# │                                                                  │
# │  Prerequisites:                                                  │
# │    - CodeQL must be enabled on the repo (code scanning alerts)   │
# │    - Devin must have access to the repo (via GitHub app)         │
# └──────────────────────────────────────────────────────────────────┘
#
# How it works:
#   1. Fetches all open CodeQL alerts from the repo
#   2. Filters alerts by minimum severity (if configured)
#   3. Sorts alerts by severity (critical → high → medium → low)
#   4. Builds a single prompt with all alerts organized by file
#   5. Creates ONE Devin batch session that orchestrates child sessions
#   6. Each child session creates a branch, fixes the issues, and opens a PR
#   7. Logs the batch session URL in the GitHub Actions job summary
#
# Triggers:
#   - Automatically every Monday at 9am UTC (configurable via cron)
#   - Manually via the Actions tab (workflow_dispatch)

name: "CodeQL Devin Remediation"

on:
  schedule:
    - cron: "0 9 * * 1"

  workflow_dispatch:
    inputs:
      max_acu_limit:
        description: "ACU budget for the entire batch session"
        required: false
        default: "5"
      severity_filter:
        description: "Minimum severity to process (critical, high, medium, low, all)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - critical
          - high
          - medium
          - low

permissions:
  contents: read
  security-events: read
  actions: read

jobs:
  remediate:
    name: "Fetch CodeQL alerts & launch Devin batch session"
    runs-on: ubuntu-latest

    steps:
      - name: Fetch alerts & create Devin batch session
        uses: actions/github-script@v7
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          DEVIN_USER_ID: ${{ secrets.DEVIN_USER_ID }}
          DEVIN_PLAYBOOK_ID: ${{ secrets.DEVIN_PLAYBOOK_ID }}
          DEVIN_CHILD_PLAYBOOK_ID: ${{ secrets.DEVIN_CHILD_PLAYBOOK_ID }}
          MAX_ACU: ${{ inputs.max_acu_limit || '5' }}
          SEVERITY_FILTER: ${{ inputs.severity_filter || 'all' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const DEVIN_API_KEY = process.env.DEVIN_API_KEY;
            const DEVIN_ORG_ID = process.env.DEVIN_ORG_ID;
            const DEVIN_USER_ID = process.env.DEVIN_USER_ID || "";
            const DEVIN_PLAYBOOK_ID = process.env.DEVIN_PLAYBOOK_ID;
            const DEVIN_CHILD_PLAYBOOK_ID = process.env.DEVIN_CHILD_PLAYBOOK_ID;
            const MAX_ACU = parseInt(process.env.MAX_ACU, 10);
            const SEVERITY_FILTER = process.env.SEVERITY_FILTER || "all";

            // Severity ranking: lower index = higher priority
            const SEVERITY_RANK = {
              critical: 0,
              high: 1,
              medium: 2,
              low: 3,
              warning: 3,
              note: 4,
            };

            function alertSeverity(alert) {
              return (
                alert.rule?.security_severity_level ||
                alert.rule?.severity ||
                "low"
              ).toLowerCase();
            }

            if (!DEVIN_API_KEY || !DEVIN_ORG_ID) {
              core.setFailed(
                "DEVIN_API_KEY and DEVIN_ORG_ID secrets are required."
              );
              return;
            }

            if (!DEVIN_PLAYBOOK_ID || !DEVIN_CHILD_PLAYBOOK_ID) {
              core.setFailed(
                "DEVIN_PLAYBOOK_ID and DEVIN_CHILD_PLAYBOOK_ID secrets are required."
              );
              return;
            }

            const repo = context.repo;
            const repoFullName = `${repo.owner}/${repo.repo}`;

            // ── 1. Fetch open CodeQL alerts ───────────────────────────────
            core.info(`Fetching open CodeQL alerts for ${repoFullName}...`);

            let alerts = [];
            let page = 1;
            while (true) {
              const { data } = await github.rest.codeScanning.listAlertsForRepo({
                owner: repo.owner,
                repo: repo.repo,
                state: "open",
                per_page: 100,
                page,
              });
              alerts = alerts.concat(data);
              if (data.length < 100) break;
              page++;
            }

            if (alerts.length === 0) {
              core.info("No open CodeQL alerts found. Nothing to do.");
              return;
            }
            core.info(`Found ${alerts.length} open CodeQL alert(s).`);

            // ── 2. Filter by minimum severity ───────────────────────────
            if (SEVERITY_FILTER !== "all") {
              const minRank = SEVERITY_RANK[SEVERITY_FILTER] ?? 3;
              const before = alerts.length;
              alerts = alerts.filter(
                (a) => (SEVERITY_RANK[alertSeverity(a)] ?? 4) <= minRank
              );
              core.info(
                `Severity filter "${SEVERITY_FILTER}": ${before} → ${alerts.length} alert(s).`
              );
              if (alerts.length === 0) {
                core.info("No alerts match the severity filter. Nothing to do.");
                return;
              }
            }

            // ── 3. Sort alerts by severity (critical first) ─────────────
            alerts.sort(
              (a, b) =>
                (SEVERITY_RANK[alertSeverity(a)] ?? 4) -
                (SEVERITY_RANK[alertSeverity(b)] ?? 4)
            );

            // ── 4. Group alerts by file path for the prompt ─────────────
            const fileGroups = new Map();
            for (const alert of alerts) {
              const filePath =
                alert.most_recent_instance?.location?.path || "unknown";
              if (!fileGroups.has(filePath)) fileGroups.set(filePath, []);
              fileGroups.get(filePath).push(alert);
            }

            const totalFiles = fileGroups.size;

            // ── 5. Build a single prompt with all alerts ────────────────
            let promptSections = [];
            for (const [filePath, fileAlerts] of fileGroups) {
              let section = `### \`${filePath}\` (${fileAlerts.length} alert${fileAlerts.length > 1 ? "s" : ""})\n`;
              for (const a of fileAlerts) {
                const loc = a.most_recent_instance?.location || {};
                const sev = alertSeverity(a);
                section += `- Alert #${a.number}: ${a.rule?.id || "unknown"} — ${a.rule?.description || a.rule?.name || "N/A"} — Severity: ${sev} — Lines: ${loc.start_line || "?"}-${loc.end_line || "?"}\n`;
                if (a.most_recent_instance?.message?.text) {
                  section += `  Message: ${a.most_recent_instance.message.text}\n`;
                }
              }
              promptSections.push(section);
            }

            const prompt = [
              `Remediate ${alerts.length} CodeQL security alert${alerts.length > 1 ? "s" : ""} in \`${repoFullName}\`.`,
              ``,
              `## Alerts by File`,
              ``,
              promptSections.join("\n"),
              `## Instructions`,
              `For each file group, create a branch, fix ALL alerts in that file, run tests, and open a PR.`,
              `Address root causes, not just suppress warnings.`,
            ].join("\n");

            const title = `CodeQL Remediation: ${alerts.length} alert${alerts.length > 1 ? "s" : ""} across ${totalFiles} file${totalFiles > 1 ? "s" : ""}`;

            // ── 6. Create ONE Devin batch session ───────────────────────
            core.info(`Creating Devin batch session: ${title}`);

            const body = {
              prompt,
              title,
              advanced_mode: "batch",
              playbook_id: DEVIN_PLAYBOOK_ID,
              child_playbook_id: DEVIN_CHILD_PLAYBOOK_ID,
              bypass_approval: true,
              repos: [repoFullName],
              max_acu_limit: MAX_ACU,
              tags: ["codeql-remediation", "automated"],
            };

            if (DEVIN_USER_ID) {
              body.create_as_user_id = DEVIN_USER_ID;
            }

            const response = await fetch(
              `https://api.devin.ai/v3/organizations/${DEVIN_ORG_ID}/sessions`,
              {
                method: "POST",
                headers: {
                  Authorization: `Bearer ${DEVIN_API_KEY}`,
                  "Content-Type": "application/json",
                },
                body: JSON.stringify(body),
              }
            );

            if (!response.ok) {
              const errText = await response.text();
              core.setFailed(
                `Failed to create batch session: ${response.status} ${errText}`
              );
              return;
            }

            const session = await response.json();
            core.info(`Batch session created: ${session.session_id} -> ${session.url}`);

            // ── 7. Generate job summary ───────────────────────────────────
            let summary = `## CodeQL Devin Remediation (Batch Mode)\n\n`;
            summary += `**Repository:** ${repoFullName}\n`;
            summary += `**Severity filter:** ${SEVERITY_FILTER}\n`;
            summary += `**Total alerts:** ${alerts.length}\n`;
            summary += `**Files affected:** ${totalFiles}\n\n`;
            summary += `### Batch Session\n\n`;
            summary += `| Session ID | URL |\n`;
            summary += `|------------|-----|\n`;
            summary += `| \`${session.session_id}\` | [Open in Devin](${session.url}) |\n\n`;
            summary += `### Alert Breakdown\n\n`;
            summary += `| File | Alerts | Severities |\n`;
            summary += `|------|--------|------------|\n`;

            for (const [filePath, fileAlerts] of fileGroups) {
              const sevs = [...new Set(fileAlerts.map((a) => alertSeverity(a)))].join(", ");
              const nums = fileAlerts.map((a) => `#${a.number}`).join(", ");
              summary += `| \`${filePath}\` | ${fileAlerts.length} (${nums}) | ${sevs} |\n`;
            }

            summary += `\nDevin will split this into child sessions — one per file group.\n`;
            summary += `Child sessions and their PRs will appear in the [Devin web app](${session.url}).\n`;

            core.summary.addRaw(summary);
            await core.summary.write();

            core.info("\n" + summary);
